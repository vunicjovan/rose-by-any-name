<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Rose By Any Name</title>
    <script>
      (function () {
        var t =
          localStorage.getItem("rose-theme") ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/uikit@3/dist/css/uikit.min.css"
    />
    <link rel="stylesheet" href="/css/rose.css" />
  </head>
  <body>
    <nav class="app-nav">
      <div class="app-nav-inner">
        <a href="/" class="app-logo">
          <span class="app-logo-rose">🌹</span>
          A Rose By Any Name
        </a>
        <div class="nav-actions">
          <a href="/add.html" class="uk-button uk-button-primary">+ Add Book</a>
          <button
            class="theme-toggle"
            id="theme-toggle"
            title="Toggle dark / light mode"
          >
            <span class="icon-moon">☾</span>
            <span class="icon-sun">☀</span>
          </button>
        </div>
      </div>
    </nav>

    <div class="uk-container" style="padding-top: 40px">
      <div class="page-header">
        <h1 class="page-title">My Reading List</h1>
      </div>
      <div
        id="book-grid"
        class="uk-grid-match uk-child-width-1-2@s uk-child-width-1-3@m uk-child-width-1-4@l"
        uk-grid
      ></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/uikit@3/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3/dist/js/uikit-icons.min.js"></script>
    <script src="/js/rose.js"></script>
  </body>
</html>
