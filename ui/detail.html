<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Detail</title>
    <script>
      (function () {
        var t =
          localStorage.getItem("rose-theme") ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
    <link rel="stylesheet" href="/vendor/uikit/css/uikit.min.css" />
    <link rel="stylesheet" href="/css/rose.css" />
    <link rel="stylesheet" href="/css/detail.css" />
  </head>
  <body>
    <nav class="app-nav">
      <div class="app-nav-inner">
        <a href="/" class="app-logo">
          <span class="app-logo-rose">🌹</span>
          A Rose By Any Name
        </a>
        <div class="nav-actions">
          <button
            class="theme-toggle"
            id="theme-toggle"
            title="Toggle dark / light mode"
          >
            <span class="icon-moon">☾</span>
            <span class="icon-sun">☀</span>
          </button>
        </div>
      </div>
    </nav>

    <div class="uk-container uk-margin-large-top uk-margin-large-bottom">
      <a href="/" class="uk-button uk-button-text uk-margin-bottom">
        <span uk-icon="arrow-left"></span> Back to list
      </a>

      <div id="state-loading" class="uk-text-center uk-margin-large-top">
        <div uk-spinner="ratio: 2"></div>
      </div>

      <div id="state-error" hidden>
        <div class="uk-alert-danger uk-margin-top" uk-alert>
          <p id="error-msg">Book not found.</p>
        </div>
      </div>

      <div id="book-detail" hidden>
        <div class="uk-grid-large uk-flex-top" uk-grid>
          <!-- ── Left column: cover + actions ── -->
          <div class="uk-width-1-3@m">
            <div class="detail-cover-wrap">
              <img id="cover-img" src="" alt="" class="detail-cover-img" />
            </div>
            <div class="uk-margin-top uk-grid-small uk-child-width-1-1" uk-grid>
              <div>
                <a
                  id="edit-btn"
                  href="#"
                  class="uk-button uk-button-primary uk-width-1-1"
                >
                  <span uk-icon="pencil"></span>&ensp;Edit
                </a>
              </div>
              <div>
                <button
                  id="delete-btn"
                  class="uk-button uk-button-danger uk-width-1-1"
                >
                  <span uk-icon="trash"></span>&ensp;Delete
                </button>
              </div>
            </div>
          </div>

          <!-- ── Right column: info ── -->
          <div class="uk-width-2-3@m">
            <h1
              id="book-title"
              class="uk-heading-small uk-margin-remove-bottom"
            ></h1>
            <p id="book-author" class="detail-author"></p>

            <hr class="uk-divider-small" />

            <table class="detail-meta-table uk-width-1-1">
              <tbody id="meta-body"></tbody>
            </table>

            <div id="summary-section" class="uk-margin-large-top" hidden>
              <h3 class="uk-heading-bullet">Summary</h3>
              <p id="book-summary" class="detail-summary"></p>
            </div>

            <div
              id="reader-section"
              class="uk-margin-large-top reader-section"
              hidden
            >
              <div id="rating-section" hidden>
                <p class="reader-section-label">Reader rating</p>
                <div class="star-rating-wrap">
                  <div class="star-rating">
                    <span id="star-fill" class="star-rating-fill"></span>
                  </div>
                  <span id="star-label" class="star-label"></span>
                </div>
              </div>

              <div id="remarks-section" class="uk-margin-top" hidden>
                <p class="reader-section-label">Reader remarks</p>
                <blockquote class="book-remarks">
                  <p id="book-remarks-text"></p>
                </blockquote>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/vendor/uikit/js/uikit.min.js"></script>
    <script src="/vendor/uikit/js/uikit-icons.min.js"></script>
    <script src="/js/rose.js"></script>
    <script src="/js/detail.js"></script>
  </body>
</html>
