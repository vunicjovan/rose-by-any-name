<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Detail</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/uikit@3/dist/css/uikit.min.css"
    />
    <link rel="stylesheet" href="/css/rose.css" />
  </head>
  <body>
    <nav class="uk-navbar-container uk-navbar-transparent detail-nav" uk-navbar>
      <div class="uk-navbar-left uk-container">
        <a href="/" class="uk-navbar-item uk-logo detail-nav-logo">
          <span uk-icon="book"></span>&ensp;A Rose By Any Name
        </a>
      </div>
    </nav>

    <div class="uk-container uk-margin-large-top uk-margin-large-bottom">
      <a href="/" class="uk-button uk-button-text uk-margin-bottom">
        <span uk-icon="arrow-left"></span> Back to list
      </a>

      <div id="state-loading" class="uk-text-center uk-margin-large-top">
        <div uk-spinner="ratio: 2"></div>
      </div>

      <div id="state-error" hidden>
        <div class="uk-alert-danger uk-margin-top" uk-alert>
          <p id="error-msg">Book not found.</p>
        </div>
      </div>

      <div id="book-detail" hidden>
        <div class="uk-grid-large uk-flex-top" uk-grid>
          <!-- ── Left column: cover + actions ── -->
          <div class="uk-width-1-3@m">
            <div class="detail-cover-wrap">
              <img id="cover-img" src="" alt="" class="detail-cover-img" />
            </div>
            <div class="uk-margin-top uk-grid-small uk-child-width-1-1" uk-grid>
              <div>
                <a
                  id="edit-btn"
                  href="#"
                  class="uk-button uk-button-primary uk-width-1-1"
                >
                  <span uk-icon="pencil"></span>&ensp;Edit
                </a>
              </div>
              <div>
                <button
                  id="delete-btn"
                  class="uk-button uk-button-danger uk-width-1-1"
                >
                  <span uk-icon="trash"></span>&ensp;Delete
                </button>
              </div>
            </div>
          </div>

          <!-- ── Right column: info ── -->
          <div class="uk-width-2-3@m">
            <h1
              id="book-title"
              class="uk-heading-small uk-margin-remove-bottom"
            ></h1>
            <p id="book-author" class="detail-author"></p>

            <hr class="uk-divider-small" />

            <table class="detail-meta-table uk-width-1-1">
              <tbody id="meta-body"></tbody>
            </table>

            <div id="summary-section" class="uk-margin-large-top" hidden>
              <h3 class="uk-heading-bullet">Summary</h3>
              <p id="book-summary" class="detail-summary"></p>
            </div>

            <div
              id="reader-section"
              class="uk-margin-large-top reader-section"
              hidden
            >
              <div id="rating-section" hidden>
                <p class="reader-section-label">Reader rating</p>
                <div class="star-rating-wrap">
                  <div class="star-rating">
                    <span id="star-fill" class="star-rating-fill"></span>
                  </div>
                  <span id="star-label" class="star-label"></span>
                </div>
              </div>

              <div id="remarks-section" class="uk-margin-top" hidden>
                <p class="reader-section-label">Reader remarks</p>
                <blockquote class="book-remarks">
                  <p id="book-remarks-text"></p>
                </blockquote>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/uikit@3/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3/dist/js/uikit-icons.min.js"></script>
    <script>
      const FALLBACK = "https://placehold.co/480x680?text=No+Cover";
      const params = new URLSearchParams(location.search);
      const bookId = params.get("id");

      function show(id) {
        document.getElementById(id).hidden = false;
      }
      function hide(id) {
        document.getElementById(id).hidden = true;
      }
      function setText(id, text) {
        document.getElementById(id).textContent = text;
      }

      const META_FIELDS = [
        { icon: "calendar", label: "Print year", key: "print_year" },
        { icon: "bookmark", label: "Reading year", key: "reading_year" },
        { icon: "file-text", label: "Pages", key: "number_of_pages" },
        { icon: "world", label: "Original language", key: "original_language" },
        { icon: "comments", label: "Read in", key: "reading_language" },
      ];

      function buildMetaTable(book) {
        const tbody = document.getElementById("meta-body");
        META_FIELDS.forEach(({ icon, label, key }) => {
          const value = book[key];
          if (value == null || value === "") return;
          const tr = document.createElement("tr");
          tr.innerHTML = `
          <td class="detail-meta-label">
            <span uk-icon="icon: ${icon}; ratio: 0.9"></span>
            ${label}
          </td>
          <td class="detail-meta-value">${value}</td>
        `;
          tbody.appendChild(tr);
        });
      }

      async function load() {
        if (!bookId) {
          hide("state-loading");
          setText("error-msg", "No book ID provided.");
          show("state-error");
          return;
        }

        let book;
        try {
          const res = await fetch(`/api/books/${bookId}`);
          if (!res.ok) throw new Error();
          book = await res.json();
        } catch {
          hide("state-loading");
          show("state-error");
          return;
        }

        // Title & author
        document.title = `${book.title} — A Rose By Any Name`;
        setText("book-title", book.title);
        setText("book-author", book.author);

        // Cover
        const img = document.getElementById("cover-img");
        img.alt = `Cover of ${book.title}`;
        img.src = book.cover_photo_url || FALLBACK;
        img.onerror = () => {
          img.src = FALLBACK;
        };

        // Metadata table
        buildMetaTable(book);

        // Summary
        if (book.summary) {
          setText("book-summary", book.summary);
          show("summary-section");
        }

        // Rating & remarks
        if (book.user_rating > 0 || book.user_remarks) {
          show("reader-section");
        }
        if (book.user_rating > 0) {
          const pct = (book.user_rating / 10) * 100;
          document.getElementById("star-fill").style.width = `${pct}%`;
          document.getElementById("star-label").textContent =
            `${book.user_rating.toFixed(1)} / 10`;
          show("rating-section");
        }
        if (book.user_remarks) {
          setText("book-remarks-text", book.user_remarks);
          show("remarks-section");
        }

        // Action buttons
        document.getElementById("edit-btn").href = `/add.html?id=${book.id}`;
        document
          .getElementById("delete-btn")
          .addEventListener("click", async () => {
            try {
              await UIkit.modal.confirm(
                `Delete "<strong>${book.title}</strong>"? This cannot be undone.`,
                { labels: { ok: "Delete", cancel: "Cancel" } },
              );
            } catch {
              return; // user cancelled
            }
            await fetch(`/api/books/${book.id}`, { method: "DELETE" });
            location.href = "/";
          });

        hide("state-loading");
        show("book-detail");
      }

      load();
    </script>
  </body>
</html>
