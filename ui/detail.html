<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Detail</title>
    <script>
      (function () {
        var t =
          localStorage.getItem("rose-theme") ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap"
    />
    <link rel="stylesheet" href="/vendor/uikit/css/uikit.min.css" />
    <link rel="stylesheet" href="/css/rose.css" />
    <link rel="stylesheet" href="/css/detail.css" />
  </head>
  <body>
    <nav class="app-nav">
      <div class="app-nav-inner">
        <a href="/" class="app-logo">
          <svg
            class="app-logo-svg"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 70 96"
            aria-hidden="true"
          >
            <defs>
              <radialGradient id="rose-grad" cx="44%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#f5924a" />
                <stop offset="20%" stop-color="#ea3f70" />
                <stop offset="48%" stop-color="#c42578" />
                <stop offset="75%" stop-color="#9b1a8c" />
                <stop offset="100%" stop-color="#6c1280" />
              </radialGradient>
              <linearGradient id="lleaf" x1="100%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#80c883" />
                <stop offset="100%" stop-color="#2d6a2e" />
              </linearGradient>
              <linearGradient id="rleaf" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#80c883" />
                <stop offset="100%" stop-color="#2d6a2e" />
              </linearGradient>
            </defs>
            <path
              d="M34.5 71 Q33.5 83 33 94"
              stroke="#2d6a2e"
              stroke-width="2.5"
              fill="none"
              stroke-linecap="round"
            />
            <path d="M34 82 Q46 77 52 67 Q42 70 34 82Z" fill="url(#rleaf)" />
            <path
              d="M34 82 Q45 74 52 67"
              stroke="#1a4a1a"
              stroke-width="0.6"
              fill="none"
              opacity="0.55"
            />
            <path d="M34 73 Q22 67 15 58 Q25 62 34 73Z" fill="url(#lleaf)" />
            <path
              d="M34 73 Q23 65 15 58"
              stroke="#1a4a1a"
              stroke-width="0.6"
              fill="none"
              opacity="0.55"
            />
            <path d="M28 65 Q25 56 30 53 Q32 60 28 65Z" fill="#2d6a2e" />
            <path d="M35 64 Q32 54 35 50 Q38 54 35 64Z" fill="#36843a" />
            <path d="M42 65 Q45 56 40 53 Q38 60 42 65Z" fill="#2d6a2e" />
            <path
              d="M23 68 Q35 72 47 68 Q40 70 35 71 Q30 70 23 68Z"
              fill="#2d6a2e"
            />
            <path
              d="M35 8 C22 9 10 23 10 42 C10 58 21 71 35 71 C49 71 60 58 60 42 C60 23 48 9 35 8Z"
              fill="url(#rose-grad)"
            />
            <path
              d="M36 10 C46 15 54 29 54 45"
              stroke="white"
              stroke-width="1.7"
              fill="none"
              opacity="0.62"
              stroke-linecap="round"
            />
            <path
              d="M29 10 C19 16 13 29 14 45"
              stroke="white"
              stroke-width="1.2"
              fill="none"
              opacity="0.42"
              stroke-linecap="round"
            />
            <path
              d="M32 8 C37 8 43 12 47 18"
              stroke="white"
              stroke-width="1.0"
              fill="none"
              opacity="0.5"
              stroke-linecap="round"
            />
          </svg>
          <span class="app-logo-text">
            <span class="app-logo-line1">A Rose</span>
            <span class="app-logo-line2">By Any Name</span>
          </span>
        </a>
        <div class="nav-actions">
          <button
            class="theme-toggle"
            id="theme-toggle"
            title="Toggle dark / light mode"
          >
            <span class="icon-moon">☾</span>
            <span class="icon-sun">☀</span>
          </button>
        </div>
      </div>
    </nav>

    <div class="uk-container uk-margin-large-top uk-margin-large-bottom">
      <a href="/" class="uk-button uk-button-text uk-margin-bottom">
        <span uk-icon="arrow-left"></span> Back to list
      </a>

      <div id="state-loading" class="uk-text-center uk-margin-large-top">
        <div uk-spinner="ratio: 2"></div>
      </div>

      <div id="state-error" hidden>
        <div class="uk-alert-danger uk-margin-top" uk-alert>
          <p id="error-msg">Book not found.</p>
        </div>
      </div>

      <div id="book-detail" hidden>
        <div class="uk-grid-large uk-flex-top" uk-grid>
          <!-- ── Left column: cover + actions ── -->
          <div class="uk-width-1-3@m">
            <div class="detail-cover-wrap">
              <img id="cover-img" src="" alt="" class="detail-cover-img" />
            </div>
            <div class="uk-margin-top uk-grid-small uk-child-width-1-1" uk-grid>
              <div>
                <a
                  id="edit-btn"
                  href="#"
                  class="uk-button uk-button-primary uk-width-1-1"
                >
                  <span uk-icon="pencil"></span>&ensp;Edit
                </a>
              </div>
              <div>
                <button
                  id="delete-btn"
                  class="uk-button uk-button-danger uk-width-1-1"
                >
                  <span uk-icon="trash"></span>&ensp;Delete
                </button>
              </div>
            </div>
          </div>

          <!-- ── Right column: info ── -->
          <div class="uk-width-2-3@m">
            <h1
              id="book-title"
              class="uk-heading-small uk-margin-remove-bottom"
            ></h1>
            <p id="book-author" class="detail-author"></p>

            <hr class="uk-divider-small" />

            <table class="detail-meta-table uk-width-1-1">
              <tbody id="meta-body"></tbody>
            </table>

            <div id="summary-section" class="uk-margin-large-top" hidden>
              <h3 class="uk-heading-bullet">Summary</h3>
              <p id="book-summary" class="detail-summary"></p>
            </div>

            <div
              id="reader-section"
              class="uk-margin-large-top reader-section"
              hidden
            >
              <div id="rating-section" hidden>
                <p class="reader-section-label">Reader rating</p>
                <div class="star-rating-wrap">
                  <div class="star-rating">
                    <span id="star-fill" class="star-rating-fill"></span>
                  </div>
                  <span id="star-label" class="star-label"></span>
                </div>
              </div>

              <div id="remarks-section" class="uk-margin-top" hidden>
                <p class="reader-section-label">Reader remarks</p>
                <blockquote class="book-remarks">
                  <p id="book-remarks-text"></p>
                </blockquote>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/vendor/uikit/js/uikit.min.js"></script>
    <script src="/vendor/uikit/js/uikit-icons.min.js"></script>
    <script src="/js/rose.js"></script>
    <script src="/js/detail.js"></script>
  </body>
</html>
