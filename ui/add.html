<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add / Edit Book</title>
    <script>
      (function () {
        var t =
          localStorage.getItem("rose-theme") ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap"
    />
    <link rel="stylesheet" href="/vendor/uikit/css/uikit.min.css" />
    <link rel="stylesheet" href="/css/rose.css" />
    <link rel="stylesheet" href="/css/add.css" />
  </head>
  <body>
    <nav class="app-nav">
      <div class="app-nav-inner">
        <a href="/" class="app-logo">
          <svg
            class="app-logo-svg"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 70 96"
            aria-hidden="true"
          >
            <defs>
              <radialGradient id="rose-grad" cx="44%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#f5924a" />
                <stop offset="20%" stop-color="#ea3f70" />
                <stop offset="48%" stop-color="#c42578" />
                <stop offset="75%" stop-color="#9b1a8c" />
                <stop offset="100%" stop-color="#6c1280" />
              </radialGradient>
              <linearGradient id="lleaf" x1="100%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#80c883" />
                <stop offset="100%" stop-color="#2d6a2e" />
              </linearGradient>
              <linearGradient id="rleaf" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#80c883" />
                <stop offset="100%" stop-color="#2d6a2e" />
              </linearGradient>
            </defs>
            <path
              d="M34.5 71 Q33.5 83 33 94"
              stroke="#2d6a2e"
              stroke-width="2.5"
              fill="none"
              stroke-linecap="round"
            />
            <path d="M34 82 Q46 77 52 67 Q42 70 34 82Z" fill="url(#rleaf)" />
            <path
              d="M34 82 Q45 74 52 67"
              stroke="#1a4a1a"
              stroke-width="0.6"
              fill="none"
              opacity="0.55"
            />
            <path d="M34 73 Q22 67 15 58 Q25 62 34 73Z" fill="url(#lleaf)" />
            <path
              d="M34 73 Q23 65 15 58"
              stroke="#1a4a1a"
              stroke-width="0.6"
              fill="none"
              opacity="0.55"
            />
            <path d="M28 65 Q25 56 30 53 Q32 60 28 65Z" fill="#2d6a2e" />
            <path d="M35 64 Q32 54 35 50 Q38 54 35 64Z" fill="#36843a" />
            <path d="M42 65 Q45 56 40 53 Q38 60 42 65Z" fill="#2d6a2e" />
            <path
              d="M23 68 Q35 72 47 68 Q40 70 35 71 Q30 70 23 68Z"
              fill="#2d6a2e"
            />
            <path
              d="M35 8 C22 9 10 23 10 42 C10 58 21 71 35 71 C49 71 60 58 60 42 C60 23 48 9 35 8Z"
              fill="url(#rose-grad)"
            />
            <path
              d="M36 10 C46 15 54 29 54 45"
              stroke="white"
              stroke-width="1.7"
              fill="none"
              opacity="0.62"
              stroke-linecap="round"
            />
            <path
              d="M29 10 C19 16 13 29 14 45"
              stroke="white"
              stroke-width="1.2"
              fill="none"
              opacity="0.42"
              stroke-linecap="round"
            />
            <path
              d="M32 8 C37 8 43 12 47 18"
              stroke="white"
              stroke-width="1.0"
              fill="none"
              opacity="0.5"
              stroke-linecap="round"
            />
          </svg>
          <span class="app-logo-text">
            <span class="app-logo-line1">A Rose</span>
            <span class="app-logo-line2">By Any Name</span>
          </span>
        </a>
        <div class="nav-actions">
          <button
            class="theme-toggle"
            id="theme-toggle"
            title="Toggle dark / light mode"
          >
            <span class="icon-moon">☾</span>
            <span class="icon-sun">☀</span>
          </button>
        </div>
      </div>
    </nav>
    <div class="uk-container uk-margin-large-top uk-margin-large-bottom">
      <a
        id="back-btn"
        href="/"
        class="uk-button uk-button-text uk-margin-bottom"
      >
        <span uk-icon="arrow-left"></span> Back to list
      </a>
      <h1 id="page-title" class="uk-heading-small">Add Book</h1>

      <form id="book-form" class="uk-form-stacked uk-margin-top" novalidate>
        <div class="uk-grid-small uk-child-width-1-2@s" uk-grid>
          <div>
            <label class="uk-form-label" for="title"
              >Title <span class="uk-text-danger">*</span></label
            >
            <div class="uk-form-controls">
              <input
                class="uk-input"
                id="title"
                name="title"
                type="text"
                required
                placeholder="e.g. The Name of the Rose"
              />
            </div>
          </div>

          <div>
            <label class="uk-form-label" for="author"
              >Author <span class="uk-text-danger">*</span></label
            >
            <div class="uk-form-controls">
              <input
                class="uk-input"
                id="author"
                name="author"
                type="text"
                required
                placeholder="e.g. Umberto Eco"
              />
            </div>
          </div>

          <div>
            <label class="uk-form-label" for="print_year">Print Year</label>
            <div class="uk-form-controls">
              <input
                class="uk-input"
                id="print_year"
                name="print_year"
                type="number"
                min="1"
                placeholder="e.g. 1980"
              />
            </div>
          </div>

          <div>
            <label class="uk-form-label" for="reading_year">Reading Year</label>
            <div class="uk-form-controls">
              <input
                class="uk-input"
                id="reading_year"
                name="reading_year"
                type="number"
                min="1"
                placeholder="e.g. 2024"
              />
            </div>
          </div>

          <div>
            <label class="uk-form-label" for="number_of_pages"
              >Number of Pages</label
            >
            <div class="uk-form-controls">
              <input
                class="uk-input"
                id="number_of_pages"
                name="number_of_pages"
                type="number"
                min="1"
                placeholder="e.g. 502"
              />
            </div>
          </div>

          <div>
            <label class="uk-form-label" for="original_language"
              >Original Language</label
            >
            <div class="uk-form-controls">
              <input
                class="uk-input"
                id="original_language"
                name="original_language"
                type="text"
                placeholder="e.g. Italian"
              />
            </div>
          </div>

          <div>
            <label class="uk-form-label" for="reading_language"
              >Reading Language</label
            >
            <div class="uk-form-controls">
              <input
                class="uk-input"
                id="reading_language"
                name="reading_language"
                type="text"
                placeholder="e.g. English"
              />
            </div>
          </div>

          <div>
            <label class="uk-form-label" for="cover_photo_url"
              >Cover Photo URL</label
            >
            <div class="uk-form-controls">
              <input
                class="uk-input"
                id="cover_photo_url"
                name="cover_photo_url"
                type="url"
                placeholder="https://..."
              />
            </div>
          </div>

          <div>
            <label class="uk-form-label" for="user_rating"
              >My Rating (0 – 10)</label
            >
            <div class="uk-form-controls">
              <input
                class="uk-input"
                id="user_rating"
                name="user_rating"
                type="number"
                min="0"
                max="10"
                step="0.1"
                placeholder="e.g. 8.5"
              />
            </div>
          </div>

          <div class="uk-width-1-1">
            <label class="uk-form-label" for="summary">Summary</label>
            <div class="uk-form-controls">
              <textarea
                class="uk-textarea"
                id="summary"
                name="summary"
                rows="5"
                placeholder="A brief description of the book..."
              ></textarea>
            </div>
          </div>

          <div class="uk-width-1-1">
            <label class="uk-form-label" for="user_remarks">My Remarks</label>
            <div class="uk-form-controls">
              <textarea
                class="uk-textarea"
                id="user_remarks"
                name="user_remarks"
                rows="3"
                placeholder="A personal note or impression..."
              ></textarea>
            </div>
          </div>
        </div>

        <div id="cover-preview-wrap" class="uk-margin" hidden>
          <p class="uk-text-muted uk-margin-remove-bottom">Cover preview:</p>
          <img id="cover-preview" src="" alt="Cover preview" />
        </div>

        <div id="form-error" class="uk-alert-danger uk-margin" uk-alert hidden>
          <p id="form-error-msg"></p>
        </div>

        <div class="uk-margin-top">
          <button
            type="submit"
            class="uk-button uk-button-primary"
            id="submit-btn"
          >
            Save Book
          </button>
          <a
            id="cancel-btn"
            href="/"
            class="uk-button uk-button-default uk-margin-left"
            >Cancel</a
          >
        </div>
      </form>
    </div>

    <script src="/vendor/uikit/js/uikit.min.js"></script>
    <script src="/vendor/uikit/js/uikit-icons.min.js"></script>
    <script src="/js/rose.js"></script>
    <script src="/js/add.js"></script>
  </body>
</html>
